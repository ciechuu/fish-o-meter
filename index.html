<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish-O-Meter - Mobile HUD Ultimate</title>
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --border-color: rgba(255, 255, 255, 0.15);
            
            /* Rarity colors */
            --common: #22c55e;
            --rare: #3b82f6;
            --epic: #a855f7;
            --legendary: #eab308;
            --monster: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- VIDEO BACKGROUND --- */
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .overlay-dim {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(2,6,23,0.8) 0%, rgba(2,6,23,0) 50%, rgba(2,6,23,0.6) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* --- GAME HUD VIEWPORT --- */
        .game-viewport {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100%;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* --- HEADER --- */
        .hud-header {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            padding-top: 10px;
            position: relative;
            z-index: 50;
        }

        .btn-info-toggle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            font-size: 20px;
            font-weight: bold;
            font-style: italic;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* --- DYNAMIC HUD ANIMATION LINE (SITS ABOVE CARD VIA NORMAL FLOW) --- */
        .interaction-animation-row {
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            gap: 12px;
            z-index: 90;
            pointer-events: none;
            min-height: 60px;
        }

        /* Column holding the "echo" (stars/rarity/variant) + the score counter right below it */
        .score-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        .reveal-echo-slot {
            min-height: 24px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin-bottom: 2px;
        }

        .reveal-echo {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 16px;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.6);
            white-space: nowrap;
            opacity: 0;
        }

        .reveal-echo.drop {
            animation: echoDrop 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Static visible state used while the star echo fills up in sync with the card */
        .reveal-echo.visible {
            opacity: 1;
            transform: translateY(-3px) scale(1);
        }

        /* Quick merge-down once the stars are fully filled — no need to re-pop-in first */
        .reveal-echo.merge {
            animation: echoMerge 0.4s cubic-bezier(0.55, 0, 0.85, 0.35) forwards;
        }

        @keyframes echoMerge {
            0%   { opacity: 1; transform: translateY(-3px) scale(1); }
            100% { opacity: 0; transform: translateY(32px) scale(0.2); }
        }

        @keyframes echoDrop {
            0%   { opacity: 0; transform: translateY(-6px) scale(0.75); }
            14%  { opacity: 1; transform: translateY(-3px) scale(1.1); }
            24%  { opacity: 1; transform: translateY(-3px) scale(1); }
            62%  { opacity: 1; transform: translateY(-3px) scale(1); } /* freeze — hold steady so it's easy to read */
            80%  { opacity: 1; transform: translateY(10px) scale(0.85); }
            100% { opacity: 0; transform: translateY(32px) scale(0.2); } /* quick merge into the counter */
        }

        /* Score Box Widget */
        .score-counter-box {
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 6px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: scale(0.6);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.15);
            flex-shrink: 0;
        }

        .score-counter-box.show-active {
            opacity: 1;
            transform: scale(1);
        }

        .score-counter-box.pulse {
            transform: scale(1.1);
            border-color: #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.5);
        }

        .score-lbl {
            font-size: 8px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .score-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .score-val {
            font-size: 22px;
            font-weight: 900;
            color: #38bdf8;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.3);
        }

        .score-counter-box.pulse .score-val { color: #4ade80; }

        .score-counter-box.merge-into-bar {
            transition: transform 0.28s cubic-bezier(0.55, 0, 0.85, 0.35), opacity 0.24s ease;
            transform: translateX(-30px) scale(0.25);
            opacity: 0;
        }

        .merging-multiplier {
            font-size: 20px;
            font-weight: 900;
            opacity: 0;
            transform: translateX(15px) scale(0.5);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
            display: none;
        }

        .merging-multiplier.show { display: inline-block; opacity: 1; transform: translateX(0) scale(1); margin-left: 6px; }
        .merging-multiplier.absorb { display: inline-block; opacity: 0; transform: translateX(-25px) scale(0.1); filter: blur(3px); transition: all 0.2s ease-in; }

        /* Inline Sliding Progress Bar - FIXED OPACITY ENGINE CONTROL (NO OVER-THE-SCREEN TRANSITIONS OUT) */
        .inline-progress-toast {
            width: 0;
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid var(--border-color);
            border-radius: 14px;
            padding: 10px 0;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            gap: 4px;
            opacity: 0;
            overflow: hidden;
            transition: width 0.45s cubic-bezier(0.65, 0, 0.35, 1), padding 0.45s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.25s ease;
            flex-shrink: 0;
            pointer-events: none;
        }

        .inline-progress-toast.show {
            width: 230px;
            padding: 10px 14px;
            opacity: 1;
            pointer-events: auto;
        }

        .level-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 11px;
            color: #94a3b8;
        }

        .progress-track-container {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
        }

        .progress-track {
            flex-grow: 1;
            height: 14px;
            background-color: #020617;
            border-radius: 7px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            box-shadow: 0 0 6px rgba(56, 189, 248, 0.5);
            transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: absolute; top: 0; left: 0; z-index: 2;
        }

        .progress-preview {
            height: 100%;
            width: 0%;
            background-color: #ffffff;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.7);
            transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        .main-reward-badge {
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-left: 3px solid var(--accent-color);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 9px;
            max-width: 90px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        /* --- LOWER SCREEN HUD BLOCK --- */
        .hud-bottom-anchor {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }

        /* Fish Stats Widget Card */
        .catch-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            padding: 16px;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            text-align: center;
            display: none;
            position: relative;
            z-index: 10;
        }

        .fish-name {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        .badges-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
            min-height: 23px;
        }

        .fish-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .variant-badge { background-color: #334155; border: 1px solid rgba(255,255,255,0.1); color: #cbd5e1; }
        .variant-1 { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; border: 1px solid #fbbf24; }
        .variant-2 { background: linear-gradient(135deg, #ec4899, #be185d); color: #fff; border: 1px solid #f472b6; }
        .variant-3 { background: linear-gradient(135deg, #06b6d4, #0891b2); color: #fff; border: 1px solid #22d3ee; }

        .stars-container {
            margin-bottom: 4px;
            height: 24px;
        }

        .stars {
            color: #fbbf24;
            font-size: 22px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        .hud-footer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 15px;
            position: relative;
            z-index: 10;
        }

        .btn-cast {
            background: linear-gradient(135deg, #0284c7 0%, #0ea5e9 50%, #38bdf8 100%);
            color: white;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 900;
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4), inset 0 2px 4px rgba(255,255,255,0.3);
            transition: all 0.15s ease;
            width: 100%;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .btn-cast:disabled { background: #334155; color: #64748b; border-color: #475569; cursor: not-allowed; box-shadow: none; text-shadow: none; }

        /* --- MODAL OVERLAYS --- */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.85); z-index: 200;
            backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; padding: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-content { background: #1e293b; border: 2px solid var(--border-color); border-radius: 20px; width: 100%; max-width: 420px; max-height: 80vh; overflow-y: auto; padding: 20px; }
        .modal-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .btn-close-modal { background: none; border: none; color: #64748b; font-size: 24px; font-weight: bold; cursor: pointer; }
        .btn-sub-reset { background: #334155; color: #ef4444; padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(239, 68, 68, 0.2); font-size: 11px; font-weight: bold; cursor: pointer; }

        .matrix-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; margin-bottom: 20px; }
        .matrix-table th, .matrix-table td { padding: 8px 2px; border: 1px solid var(--border-color); }
        .matrix-table th { color: #94a3b8; background-color: rgba(15, 23, 42, 0.4); }
        .matrix-table td.matrix-header { text-align: left; padding-left: 4px; }
        .matrix-table .fish-badge { font-size: 8px; padding: 2px 6px; animation: none; display: inline-block; }
        .matrix-val { font-weight: bold; color: #38bdf8; font-size: 12px; }

        .log-card { background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); border-left: 4px solid var(--border-color); border-radius: 8px; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; text-align: left;}
        .log-card-header { display: flex; justify-content: space-between; align-items: center; }
        .log-fish-name { font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .log-pts { font-size: 13px; font-weight: bold; color: #4ade80; }
        .log-badges { display: flex; gap: 6px; }
        .log-badge-mini { font-size: 8px; padding: 2px 6px; border-radius: 10px; font-weight: bold; text-transform: uppercase; }
        .log-stars { color: #fbbf24; font-size: 11px; }

        .flying-particle {
            position: absolute;
            font-weight: bold;
            color: #ffffff;
            font-size: 22px;
            pointer-events: none;
            z-index: 1000;
            text-shadow: 0 0 10px rgba(56, 189, 248, 1);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
    </style>
</head>

                { id: 31, target: 1950, reward: "25🪝" },
                { id: 32, target: 2200, reward: "1🧰" },
                { id: 33, target: 2450, reward: "100🪙" },
                { id: 34, target: 2700, reward: "10🌽" },
                { id: 35, target: 2950, reward: "25🪝" },
                { id: 36, target: 3200, reward: "1🧰" },
                { id: 37, target: 3450, reward: "100🪙" },
                { id: 38, target: 3700, reward: "10🌽" },
                { id: 39, target: 3950, reward: "25🪝" },
                { id: 40, target: 4200, reward: "1🧰" },
                { id: 41, target: 4700, reward: "100🪙" },
                { id: 42, target: 5200, reward: "10🌽" },
                { id: 43, target: 5700, reward: "25🪝" },
                { id: 44, target: 6200, reward: "1🧰" },
                { id: 45, target: 6700, reward: "100🪙" },
                { id: 46, target: 7200, reward: "10🌽" },
                { id: 47, target: 7700, reward: "25🪝" },
                { id: 48, target: 8200, reward: "1🧰" },
                { id: 49, target: 8700, reward: "100🪙" },
                { id: 50, target: 9200, reward: "10🌽" }
            ];

            const rarities = [
                { name: "Common", multiplier: 1, color: "var(--common)", weight: 40 },
                { name: "Rare", multiplier: 2, color: "var(--rare)", weight: 30 },
                { name: "Epic", multiplier: 5, color: "var(--epic)", weight: 15 },
                { name: "Legendary", multiplier: 10, color: "var(--legendary)", weight: 10 },
                { name: "Monster", multiplier: 25, color: "var(--monster)", weight: 5 }
            ];

            const variants = [
                { name: "No Variant", multiplier: 1, weight: 55, badgeClass: "variant-badge" },
                { name: "Variant I", multiplier: 5, weight: 20, badgeClass: "variant-1" },
                { name: "Variant II", multiplier: 10, weight: 15, badgeClass: "variant-2" },
                { name: "Variant III", multiplier: 25, weight: 10, badgeClass: "variant-3" }
            ];

            let totalScore = 0;
            let totalCatches = 0;
            let currentMilestoneIdx = 0;
            let catchesHistory = [];
            let toastHideTimeout = null;

            let currentFish = null;
            let currentScoreAccumulator = 0;

            function openMenuModal() { document.getElementById('menu-modal').classList.add('open'); }
            function closeMenuModal() { document.getElementById('menu-modal').classList.remove('open'); }

            function updateUIElementsOnly() {
                const endBarTxt = document.getElementById('end-bar-reward-txt');
                if (currentMilestoneIdx < milestones.length) {
                    const ms = milestones[currentMilestoneIdx];
                    const prevTarget = currentMilestoneIdx === 0 ? 0 : milestones[currentMilestoneIdx - 1].target;
                    const progressInCurrentMilestone = totalScore - prevTarget;
                    const milestoneRange = ms.target - prevTarget;

                    const mTitle = document.getElementById('milestone-title');
                    const pText = document.getElementById('progress-text');
                    if(mTitle) mTitle.innerText = `Próg ${ms.id}/${milestones.length}`;
                    if(pText) pText.innerText = `${Math.max(0, progressInCurrentMilestone)} / ${milestoneRange} pkt`;
                    if(endBarTxt) endBarTxt.innerText = ms.reward;
                } else {
                    const mTitle = document.getElementById('milestone-title');
                    const pText = document.getElementById('progress-text');
                    if(mTitle) mTitle.innerText = "UKOŃCZONO 🎉";
                    if(pText) pText.innerText = "Max poziom!";
                    if(endBarTxt) endBarTxt.innerText = "Sezon Max!";
                }
                updateMapProgressBarOnly();
            }

            function updateMapProgressBarOnly() {
                if (currentMilestoneIdx < milestones.length) {
                    const ms = milestones[currentMilestoneIdx];
                    const prevTarget = currentMilestoneIdx === 0 ? 0 : milestones[currentMilestoneIdx - 1].target;
                    const progressInCurrentMilestone = totalScore - prevTarget;
                    const milestoneRange = ms.target - prevTarget;
                    const percent = Math.min(100, (Math.max(0, progressInCurrentMilestone) / milestoneRange) * 100);
                    
                    const pPreview = document.getElementById('progress-preview');
                    const pFill = document.getElementById('progress-fill');
                    if(pPreview) pPreview.style.width = `${percent}%`;
                    if(pFill) pFill.style.width = `${percent}%`;
                } else {
                    const pFill = document.getElementById('progress-fill');
                    const pPreview = document.getElementById('progress-preview');
                    if(pFill) { pFill.style.width = `100%`; pFill.style.background = "linear-gradient(90deg, #eab308, #f59e0b)"; }
                    if(pPreview) pPreview.style.width = `100%`;
                }
            }

            function animateValueIncrement(elementId, start, end, duration) {
                const obj = document.getElementById(elementId);
                if (!obj) return;
                const range = end - start;
                let startTime = null;
                function step(currentTime) {
                    if (!startTime) startTime = currentTime;
                    const progress = Math.min((currentTime - startTime) / duration, 1);
                    obj.innerText = Math.floor(progress * range + start);
                    if (progress < 1) window.requestAnimationFrame(step); else obj.innerText = end;
                }
                window.requestAnimationFrame(step);
            }

        // Shows a small copy of whatever just appeared on the catch card directly above
        // the fish-o-points counter, then lets it drop/merge down into it. Used for the
        // one-shot rarity/variant badge reveals.
            function playEcho(html, colorOverride) {
                const echo = document.getElementById('reveal-echo');
                if (!echo) return;
                echo.classList.remove('visible', 'merge', 'drop');
            void echo.offsetWidth; // force reflow so the animation can be restarted
            echo.innerHTML = html;
            echo.style.color = colorOverride || '';
            echo.style.textShadow = colorOverride ? `0 0 8px ${colorOverride}` : '';
            echo.classList.add('drop');
        }

        // Stars echo mirrors the card exactly: appears empty at the same moment,
        // fills up star-by-star in sync, then merges down once full.
        function showStarsEcho(totalStars) {
            const echo = document.getElementById('reveal-echo');
            if (!echo) return;
            echo.classList.remove('drop', 'merge');
            echo.style.color = '#fbbf24';
            echo.style.textShadow = '0 0 8px rgba(251, 191, 36, 0.6)';
            echo.innerHTML = '☆'.repeat(totalStars);
            echo.classList.add('visible');
        }

        function updateStarsEcho(filled, total) {
            const echo = document.getElementById('reveal-echo');
            if (!echo) return;
            echo.innerHTML = '★'.repeat(filled) + '☆'.repeat(Math.max(0, total - filled));
        }

        function mergeStarsEchoDown() {
            const echo = document.getElementById('reveal-echo');
            if (!echo) return;
            echo.classList.remove('visible');
            echo.classList.add('merge');
        }

        function preloadVideos() {
            backgroundVideos.forEach(url => {
                const link = document.createElement('link');
                link.rel = 'preload';
                link.href = url;
                link.as = 'video';
                document.head.appendChild(link);
            });
        }
// Odpalamy preloading od razu po załadowaniu skryptu
        preloadVideos();

        function switchBackgroundVideo() {
            const video = document.getElementById('bg-video');
            if (!video || backgroundVideos.length === 0) return;

            let next = backgroundVideos[Math.floor(Math.random() * backgroundVideos.length)];
            if (backgroundVideos.length > 1) {
                while (next === currentBgVideo) {
                    next = backgroundVideos[Math.floor(Math.random() * backgroundVideos.length)];
                }
            }
            currentBgVideo = next;

    // Płynne ściemnienie ekranu przed zmianą (maskuje przeskok klatek)
            video.style.opacity = '0';

            setTimeout(() => {
        // Czyścimy poprzedni stan wideo z pamięci RAM, aby zapobiec pikselozie po wielu rzutach
                video.pause();
                video.removeAttribute('src'); 
                video.load(); 

        // Ładujemy nowe wideo bezpośrednio na tag główny (najbardziej stabilne na iOS/Android)
                video.src = next;
                video.load();

        // Wymuszamy odtworzenie i płynnie rozjaśniamy tło
                video.play().then(() => {
                    video.style.opacity = '1';
                }).catch(() => {
            // Failsafe: jeśli przeglądarka zablokuje autoplay, i tak rozjaśniamy tło
                    video.style.opacity = '1';
                });
    }, 250); // Skrócony czas przejścia dla lepszego "game feel"
        }

        function rollFish() {
            const totalRarityWeight = rarities.reduce((sum, r) => sum + r.weight, 0);
            let rRand = Math.random() * totalRarityWeight;
            let selectedRarity = rarities[0];
            for (const r of rarities) { if (rRand < r.weight) { selectedRarity = r; break; } rRand -= r.weight; }
                const speciesList = fishDatabase[selectedRarity.name];
            const speciesName = speciesList[Math.floor(Math.random() * speciesList.length)];
            const totalVarWeight = variants.reduce((sum, v) => sum + v.weight, 0);
            let vRand = Math.random() * totalVarWeight;
            let selectedVariant = variants[0];
            for (const v of variants) { if (vRand < v.weight) { selectedVariant = v; break; } vRand -= v.weight; }
                return { name: speciesName, rarity: selectedRarity.name, rarityMul: selectedRarity.multiplier, color: selectedRarity.color, variant: selectedVariant.name, variantMul: selectedVariant.multiplier, badgeClass: selectedVariant.badgeClass, stars: Math.floor(Math.random() * 5) + 1 };
        }

        // --- HARD REBUILT STATE MACHINE ENGINE ---
        function castRod() {
            // Lock control interface instantly
            document.getElementById('cast-btn').disabled = true; 

            // Roll a new background clip for this cast
            switchBackgroundVideo();

            // Clean active display states
            document.getElementById('inline-toast').classList.remove('show');
            if(toastHideTimeout) clearTimeout(toastHideTimeout);

            currentFish = rollFish();
            currentScoreAccumulator = 0;

            const scoreBox = document.getElementById('score-box');
            if(scoreBox) {
                scoreBox.classList.remove('merge-into-bar');
                document.getElementById('fish-score-val').innerText = "0";
                scoreBox.classList.add('show-active');
            }

            const echoReset = document.getElementById('reveal-echo');
            if(echoReset) { echoReset.classList.remove('drop', 'visible', 'merge'); echoReset.innerHTML = ''; echoReset.style.color = ''; echoReset.style.textShadow = ''; }

            const cardWidget = document.getElementById('current-catch-card');
            if(cardWidget) {
                cardWidget.style.display = "block";
                cardWidget.innerHTML = `
                    <div class="fish-name" style="color: ${currentFish.color};">${currentFish.name}</div>
                    <div class="badges-row" id="badges-row-element"></div>
                    <div class="stars-container">
                        <span class="stars" id="stars-el">☆☆☆☆☆</span>
                    </div>
                `;
            }

            // Star echo appears empty at the exact same moment as the card's stars
            showStarsEcho(5);

            // Fire Step 1
            setTimeout(stateFillStars, 300);
        }

        function stateFillStars() {
            let starIdx = 0;
            function runStarTicker() {
                if (starIdx < currentFish.stars) {
                    starIdx++;
                    const emptyStr = "☆".repeat(5 - starIdx);
                    const starsEl = document.getElementById('stars-el');
                    if (starsEl) {
                        if (starIdx === 1) starsEl.innerHTML = `<span class="star-pop">★</span>` + emptyStr;
                        else starsEl.innerHTML = "★".repeat(starIdx - 1) + `<span class="star-pop">★</span>` + emptyStr;
                    }

                    currentScoreAccumulator = starIdx;
                    document.getElementById('fish-score-val').innerText = currentScoreAccumulator;
                    updateStarsEcho(starIdx, 5);
                    document.getElementById('score-box').classList.add('pulse');
                    
                    setTimeout(() => {
                        document.getElementById('score-box').classList.remove('pulse');
                        runStarTicker();
                    }, 140);
                } else {
                    mergeStarsEchoDown();
                    setTimeout(stateRevealRarity, 450);
                }
            }
            runStarTicker();
        }

        function stateRevealRarity() {
            const badgesRow = document.getElementById('badges-row-element');
            if(!badgesRow) { stateRevealVariant(); return; }

            const rBadge = document.createElement('span');
            rBadge.className = 'fish-badge';
            rBadge.innerText = currentFish.rarity;
            rBadge.style.backgroundColor = currentFish.color;
            rBadge.style.color = '#000';
            badgesRow.appendChild(rBadge);

            playEcho(`<span class="fish-badge" style="background:${currentFish.color}; color:#000; padding:3px 10px; font-size:10px;">${currentFish.rarity}</span>`);

            const nextTotal = currentScoreAccumulator * currentFish.rarityMul;
            
            const mulEl = document.getElementById('merge-mul');
            const box = document.getElementById('score-box');
            
            mulEl.className = "merging-multiplier";
            mulEl.style.display = "inline-block";
            void mulEl.offsetWidth; 
            mulEl.innerText = `x${currentFish.rarityMul}`;
            mulEl.style.color = currentFish.color;
            mulEl.style.textShadow = `0 0 10px ${currentFish.color}`;
            mulEl.classList.add('show');

            setTimeout(() => {
                mulEl.className = "merging-multiplier absorb";
                box.classList.add('pulse');
                animateValueIncrement('fish-score-val', currentScoreAccumulator, nextTotal, 200);
                currentScoreAccumulator = nextTotal;

                setTimeout(() => {
                    box.classList.remove('pulse');
                    mulEl.className = "merging-multiplier";
                    mulEl.style.display = "none";
                    stateRevealVariant();
                }, 300);
            }, 600);
        }

        function stateRevealVariant() {
            if (currentFish.variant === "No Variant") {
                // Fixed: Added decoupling buffer delay to secure asynchronous threads execution safety bounds
                setTimeout(stateFinalizeAndSlideBar, 100);
                return;
            }

            const badgesRow = document.getElementById('badges-row-element');
            if(!badgesRow) { setTimeout(stateFinalizeAndSlideBar, 100); return; }

            const vBadge = document.createElement('span');
            vBadge.className = `fish-badge ${currentFish.badgeClass}`;
            vBadge.innerText = currentFish.variant;
            badgesRow.appendChild(vBadge);

            let variantColor = '#fbbf24';
            if(currentFish.variant === "Variant II") variantColor = '#ec4899';
            if(currentFish.variant === "Variant III") variantColor = '#22d3ee';

            playEcho(`<span class="fish-badge ${currentFish.badgeClass}" style="padding:3px 10px; font-size:10px;">${currentFish.variant}</span>`);

            const nextTotal = currentScoreAccumulator * currentFish.variantMul;
            
            const mulEl = document.getElementById('merge-mul');
            const box = document.getElementById('score-box');
            
            mulEl.className = "merging-multiplier";
            mulEl.style.display = "inline-block";
            void mulEl.offsetWidth; 
            mulEl.innerText = `x${currentFish.variantMul}`;
            mulEl.style.color = variantColor;
            mulEl.style.textShadow = `0 0 10px ${variantColor}`;
            mulEl.classList.add('show');

            setTimeout(() => {
                mulEl.className = "merging-multiplier absorb";
                box.classList.add('pulse');
                animateValueIncrement('fish-score-val', currentScoreAccumulator, nextTotal, 200);
                currentScoreAccumulator = nextTotal;

                setTimeout(() => {
                    box.classList.remove('pulse');
                    mulEl.className = "merging-multiplier";
                    mulEl.style.display = "none";
                    stateFinalizeAndSlideBar();
                }, 300);
            }, 600);
        }

        function stateFinalizeAndSlideBar() {
            // 1) Unfold the progress bar from the right — since the row is right-aligned,
            //    growing it naturally pushes the fish-o-points counter to the left.
            document.getElementById('inline-toast').classList.add('show');

            // 2) Once the bar has mostly unfolded, merge the counter down into it.
            setTimeout(() => {
                const box = document.getElementById('score-box');
                if (box) box.classList.add('merge-into-bar');

                // 3) Once the counter has merged in, commit the catch and play the progress animation.
                setTimeout(() => {
                    commitCatch(currentScoreAccumulator, currentFish, () => {
                        // CRITICAL UNLOCK TRIGGER: Button activates ONLY at the absolute successful end of loop chain
                        document.getElementById('cast-btn').disabled = false;
                    });
                }, 300);
            }, 400);
        }

        function animateProgressBarChained(incomingPoints, fish, finalCallback) {
            let scorePointer = totalScore;
            const targetScore = totalScore + incomingPoints;
            
            const previewBar = document.getElementById('progress-preview');
            const colorFillBar = document.getElementById('progress-fill');

            function runLevelSegmentAnimation() {
                if (currentMilestoneIdx >= milestones.length) {
                    totalScore = targetScore;
                    updateUIElementsOnly();
                    if(previewBar) previewBar.style.width = '100%';
                    if(colorFillBar) colorFillBar.style.width = '100%';
                    scheduleToastHide();
                    finalCallback();
                    return;
                }

                const ms = milestones[currentMilestoneIdx];
                const prevTarget = currentMilestoneIdx === 0 ? 0 : milestones[currentMilestoneIdx - 1].target;
                const milestoneRange = ms.target - prevTarget;

                if (targetScore >= ms.target) {
                    if(previewBar) previewBar.style.width = '100%';
                    if(colorFillBar) colorFillBar.style.width = '100%';

                    setTimeout(() => {
                        currentMilestoneIdx++;
                        scorePointer = ms.target;

                        //alert(`🎉 Gratulacje! Odblokowałeś Próg ${ms.id}!\nNagroda: ${ms.reward}`);

                        if(previewBar) { previewBar.style.transition = 'none'; previewBar.style.width = '0%'; }
                        if(colorFillBar) { colorFillBar.style.transition = 'none'; colorFillBar.style.width = '0%'; }
                        
                        updateUIElementsOnly();
                        void colorFillBar.offsetWidth;
                        
                        if(previewBar) previewBar.style.transition = 'width 0.3s cubic-bezier(0.25, 1, 0.5, 1)';
                        if(colorFillBar) colorFillBar.style.transition = 'width 0.4s cubic-bezier(0.25, 1, 0.5, 1)';

                        runLevelSegmentAnimation();
                    }, 450);
                } else {
                    const remainderInLevel = targetScore - prevTarget;
                    const finalPercent = Math.min(100, (remainderInLevel / milestoneRange) * 100);

                    if(previewBar) previewBar.style.width = `${finalPercent}%`;
                    setTimeout(() => {
                        if(colorFillBar) colorFillBar.style.width = `${finalPercent}%`;
                        totalScore = targetScore;
                        updateUIElementsOnly();
                        scheduleToastHide();
                        finalCallback();
                    }, 250);
                }
            }
            runLevelSegmentAnimation();
        }

        function scheduleToastHide() {
            if(toastHideTimeout) clearTimeout(toastHideTimeout);
            // Hide bar neatly after 1.5 seconds turbo buffer interval
            toastHideTimeout = setTimeout(() => {
                document.getElementById('inline-toast').classList.remove('show');
                const box = document.getElementById('score-box');
                if (box) { box.classList.remove('show-active'); box.classList.remove('merge-into-bar'); }
            }, 1500);
        }

        // The fish-o-points counter now visually merges into the progress bar itself
        // (see stateFinalizeAndSlideBar), so this just logs the catch and runs the bar fill.
        function commitCatch(points, fish, callback) {
            totalCatches++;

            const logBox = document.getElementById('log-container');
            if (logBox) {
                if (catchesHistory.length === 0) logBox.innerHTML = '';
                const logCard = document.createElement('div');
                logCard.className = 'log-card'; logCard.style.borderLeftColor = fish.color;
                logCard.innerHTML = `<div class="log-card-header"><div class="log-fish-name" style="color: ${fish.color};">${fish.name}</div><div class="log-pts">+${points} pkt</div></div><div class="log-card-header"><div class="log-badges"><span class="log-badge-mini" style="background-color: ${fish.color}; color: #000;">${fish.rarity}</span><span class="log-badge-mini ${fish.badgeClass}">${fish.variant}</span></div><div class="log-stars">${"★".repeat(fish.stars)}${"☆".repeat(5 - fish.stars)}</div></div>`;
                logBox.insertBefore(logCard, logBox.firstChild);
            }
            catchesHistory.push({ ...fish, points });

            animateProgressBarChained(points, fish, callback);
        }

        function resetGame() {
            if (confirm("Czy na pewno chcesz zresetować progres?")) {
                totalScore = 0; totalCatches = 0; currentMilestoneIdx = 0; catchesHistory = [];
                document.getElementById('progress-preview').style.width = `0%`;
                document.getElementById('progress-fill').style.width = `0%`;
                document.getElementById('log-container').innerHTML = `<div style="color: #64748b; font-style: italic; text-align: center; font-size: 12px; padding: 10px;">Brak połowów w tym sezonie.</div>`;
                updateUIElementsOnly();
                closeMenuModal();
            }
        }

        // Initialize UI settings on startup
        updateUIElementsOnly();
    </script>
